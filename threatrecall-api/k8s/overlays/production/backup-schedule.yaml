apiVersion: velero.io/v1
kind: Backup
metadata:
  name: threatrecall-daily
  namespace: velero
spec:
  schedule: 0 2 * * *
  template:
    includedNamespaces:
      - threatrecall-production
      - threatrecall-staging
    includedResources:
      - persistentvolumeclaims
      - persistentvolumes
      - secrets
      - configmaps
    labelSelector:
      matchLabels:
        app: threatrecall-api
    storageLocation: default
    volumeSnapshotLocations:
      - aws-default
    ttl: 720h0m0s  # 30 days
    hooks:
      resources:
        - name: pre-backup-hook
          includedNamespaces:
            - threatrecall-production
          labelSelector:
            matchLabels:
              app: threatrecall-api
          pre:
            - exec:
                container: api
                command: ["/bin/sh", "-c", "echo 'Backup starting' && sync"]
          post:
            - exec:
                container: api
                command: ["/bin/sh", "-c", "echo 'Backup complete'"]
