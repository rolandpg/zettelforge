apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: threatrecall-vault
  namespace: threatrecall-production
spec:
  provider: vault
  parameters:
    vaultAddress: "http://vault.vault-system:8200"
    roleName: "threatrecall-api"
    objects: |
      - objectName: "api-key"
        secretPath: "secret/data/threatrecall/api"
        secretKey: "api-key"
      - objectName: "vault-token"
        secretPath: "secret/data/threatrecall/vault"
        secretKey: "token"
  secretObjects:
    - secretName: threatrecall-api-secrets
      type: Opaque
      data:
        - objectName: api-key
          key: TR_VAULT_TOKEN
        - objectName: vault-token
          key: VAULT_TOKEN
