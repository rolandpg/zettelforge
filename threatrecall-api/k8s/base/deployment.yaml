apiVersion: apps/v1
kind: Deployment
metadata:
  name: threatrecall-api
  labels:
    app: threatrecall-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: threatrecall-api
  template:
    metadata:
      labels:
        app: threatrecall-api
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: api
          image: ghcr.io/rolandpg/threatrecall-api:main
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: TR_DATA_DIR
              value: /data/threatrecall
            - name: TR_SECRETS_BACKEND
              value: env
            - name: TR_LOG_LEVEL
              value: INFO
            - name: TR_API_WORKERS
              value: "4"
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
          volumeMounts:
            - name: data
              mountPath: /data
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: threatrecall-data
        - name: tmp
          emptyDir: {}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - threatrecall-api
                topologyKey: kubernetes.io/hostname
