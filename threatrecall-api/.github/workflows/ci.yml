# CI Pipeline - Tests, Linting, Security
# Per GOV-011: Continuous integration for quality gates

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  TR_SECRETS_BACKEND: env
  TR_DATA_DIR: /tmp/threatrecall-test

jobs:
  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install ruff mypy bandit safety

      - name: Lint with Ruff
        run: ruff check src/ --output-format=github

      - name: Type check with mypy
        run: mypy src/threatrecall_api --ignore-missing-imports

      - name: Security scan with bandit
        run: bandit -r src/ -f json -o bandit-report.json || true

      - name: Upload security report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-report
          path: bandit-report.json

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run unit tests
        run: |
          export PYTHONPATH=src
          pytest tests/unit/ -v --cov=src/threatrecall_api --cov-report=xml --cov-report=term

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      ollama:
        image: ollama/ollama:latest
        ports:
          - 11434:11434
        options: --gpus all
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Pull embedding model
        run: |
          sleep 10  # Wait for Ollama to start
          curl -X POST http://localhost:11434/api/pull -d '{"name": "nomic-embed-text"}'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run integration tests
        run: |
          export PYTHONPATH=/home/runner/work/threatrecall-api/threatrecall-api/memory:src
          export TR_DATA_DIR=/tmp/threatrecall-test
          pytest tests/integration/ -v --tb=short
        continue-on-error: true  # MVP limitations expected

  governance-check:
    name: Governance Compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check GOV-005 error format
        run: |
          # Verify error responses use standard envelope
          if grep -r "detail.*code.*message" src/threatrecall_api/api/routes/ --include="*.py" | grep -v "error.*:"; then
            echo "Warning: Some error responses may not follow GOV-005 format"
          fi

      - name: Check for hardcoded secrets
        run: |
          if grep -r "password\|secret\|token\|key" src/ --include="*.py" | grep -E "(=\s*['\"]|:\s*['\"])" | grep -v "^.*#"; then
            echo "Potential hardcoded secrets found"
            exit 1
          fi

      - name: Verify OCSF logging present
        run: |
          if ! grep -r "class_uid.*6002" src/ --include="*.py"; then
            echo "OCSF class 6002 (API Activity) logging not found"
            exit 1
          fi
          echo "OCSF logging verified"
