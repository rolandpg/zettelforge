# Dependabot configuration
# Automated dependency updates

version: 2

updates:
  # Python dependencies
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: sunday
    open-pull-requests-limit: 10
    reviewers:
      - rolandpg
    labels:
      - dependencies
      - python
    commit-message:
      prefix: "deps"
      include: scope

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: sunday
    open-pull-requests-limit: 5
    reviewers:
      - rolandpg
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: "ci"
      include: scope

  # Docker
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: sunday
    open-pull-requests-limit: 5
    reviewers:
      - rolandpg
    labels:
      - dependencies
      - docker
    commit-message:
      prefix: "docker"
      include: scope
