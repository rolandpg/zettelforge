# ThreatRecall API - Docker Compose
# Local development and testing configuration

version: "3.8"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - TR_DATA_DIR=/data/threatrecall
      - TR_SECRETS_BACKEND=env
      - TR_LOG_LEVEL=DEBUG
      - PYTHONPATH=/app/src:/app/memory
    volumes:
      - threatrecall-data:/data/threatrecall
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # Optional: Redis for distributed rate limiting
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    # Uncomment when Redis-backed rate limiting is enabled
    # environment:
    #   - TR_RATE_LIMIT_BACKEND=redis
    #   - TR_REDIS_URL=redis://redis:6379/0

volumes:
  threatrecall-data:
  redis-data:
