# Governance Controls Manifest — Single Source of Truth
#
# Every CI governance step MUST reference a control_id declared here.
# Every control declared here MUST have a ci_step or runtime enforcement.
# The spec-drift check (tests/test_governance_spec_drift.py) validates both.
#
# To add a new governance check:
#   1. Add the control here with rules and enforcement
#   2. Add the CI step or runtime code
#   3. Run tests — spec-drift check will verify alignment

controls:
  GOV-003:
    name: Python Standards
    category: Code Quality
    enforcement: ci
    rules:
      - id: naming
        description: "PEP 8 naming conventions: snake_case for functions, PascalCase for classes"
        ci_step: "Lint with ruff"
        tool: "ruff (N rules)"
      - id: format
        description: "Code formatting with ruff"
        ci_step: "Format check with ruff"
        tool: "ruff format"

  GOV-007:
    name: Testing Standards
    category: Quality Assurance
    enforcement: ci
    rules:
      - id: coverage
        description: "Minimum 67% line coverage"
        ci_step: "Test with pytest"
        tool: "pytest-cov --cov-fail-under=67"

  GOV-009:
    name: Dependency Management
    category: Supply Chain
    enforcement: ci
    rules:
      - id: vulnerability_scanning
        description: "Audit dependencies for known vulnerabilities on every PR"
        ci_step: "Audit dependencies (any reported vuln blocks)"
        tool: "pip-audit --strict --vulnerability-service=osv"
      - id: snyk_sca
        description: "SCA (Software Composition Analysis) scan; HIGH/CRITICAL fails the gate"
        ci_step: "Snyk Open Source test (SCA)"
        tool: "snyk test --severity-threshold=high"
      - id: snyk_sast
        description: "SAST (Static Application Security Testing); HIGH/CRITICAL fails the gate"
        ci_step: "Snyk Code test (SAST)"
        tool: "snyk code test --severity-threshold=high"

  GOV-011:
    name: Access Control & Input Validation
    category: Security
    enforcement: runtime
    rules:
      - id: input_validation
        description: "Content must be str or have .content attribute"
        runtime_method: "GovernanceValidator.validate_operation"
      # The 2026-04-25 compliance audit (C-2) found that a previously-declared
      # `no_hardcoded_secrets` rule pointed at GovernanceValidator.validate_operation
      # as its runtime_method, but that method contains no secret-detection
      # logic. Honest state: NOT IMPLEMENTED at runtime today. Static
      # enforcement is provided by GitGuardian (CI) and (once GOV-003-mandated
      # `S` rules are restored to ruff config — audit H-1) Bandit S105/S106/S108.
      # Runtime detector (regex + entropy + detect-secrets) is tracked as
      # follow-up work; the rule will be re-declared here when implemented.
      # Removed rather than left fabricated — see tasks/compliance-audit-2026-04-25.md.

  GOV-012:
    name: Audit Logging
    category: Observability
    enforcement: runtime
    rules:
      - id: structured_logging
        description: "All operations emit structured OCSF log entries"
        runtime_method: "ocsf.log_api_activity"
      - id: operation_coverage
        description: "remember, recall, synthesize operations are logged"
        test: "tests/test_logging_compliance.py"

  GOV-006:
    # The 2026-04-25 audit (H-4) flagged that GOV-006 §"Approval
    # Requirements" requires "the reviewer must not be the PR author,"
    # which is physically impossible in a solo-maintainer project.
    # Until a second human maintainer is added to CODEOWNERS, the
    # compensating controls below are the project's good-faith
    # equivalent of the two-person rule. They are listed here so an
    # external auditor can see what's enforcing this control today
    # and so the project's spec-drift validator records each as a
    # tracked CI gate. The accompanying GOV-006 doc amendment lives
    # in the separate `rolandpg/governance` repo.
    name: Code Review (Solo-Maintainer Compensating Controls)
    category: Change Control
    enforcement: ci
    rules:
      - id: ci_green_required
        description: "Every PR must pass the CI gate (lint, tests, governance, build, pip-audit) before merge"
        ci_step: "Test with pytest"
        tool: "GitHub branch protection on master (required status checks)"
      - id: lint_gate
        description: "Static analysis catches what a human reviewer would otherwise catch"
        ci_step: "Lint with ruff"
        tool: "ruff (full GOV-003 rule set)"
      - id: governance_drift_gate
        description: "Governance spec-drift check enforces controls.yaml ↔ workflows alignment"
        ci_step: "Governance spec-drift check"
        tool: "tests/test_governance_spec_drift.py"
      # Secret scanning is provided by GitGuardian (GitHub App, named
      # "GitGuardian Security Checks" in branch-protection required
      # status checks) and is part of the GOV-006 compensating control
      # set in spirit. It is not declared here because the spec-drift
      # validator only inspects workflow YAML; GitGuardian runs as a
      # GitHub-native check, not as a workflow step. See L-3 follow-up.
