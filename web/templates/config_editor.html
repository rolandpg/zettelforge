{% extends "base.html" %}

{% block title %}ZettelForge — Configuration{% endblock %}

{% block content %}
<div class="config-container">
    <div class="config-header">
        <h1>Configuration</h1>
        <span class="config-path">{{ config_path }}</span>
    </div>
    
    <div class="config-layout">
        <!-- Left: Form-based editor -->
        <div class="config-form-panel">
            <h2>Quick Settings</h2>
            <div id="config-form">
                <div class="loading">Loading schema...</div>
            </div>
            <div class="form-actions">
                <button onclick="saveConfigForm()" class="btn-primary">Save Changes</button>
                <button onclick="reloadConfig()" class="btn-secondary">Reload from Disk</button>
            </div>
        </div>
        
        <!-- Right: YAML editor -->
        <div class="config-yaml-panel">
            <h2>YAML Editor</h2>
            <div class="yaml-editor-wrapper">
                <textarea 
                    id="config-yaml" 
                    class="yaml-editor"
                    spellcheck="false"
                >{{ config_yaml }}</textarea>
            </div>
            <div class="form-actions">
                <button onclick="saveConfigYaml()" class="btn-primary">Save YAML</button>
                <button onclick="validateYaml()" class="btn-secondary">Validate</button>
            </div>
        </div>
    </div>
    
    <!-- Status messages -->
    <div id="config-status" class="config-status"></div>
</div>
{% endblock %}

{% block extra_css %}
<style>
.config-container {
    max-width: 1200px;
    margin: 0 auto;
    padding: var(--space-6);
}

.config-header {
    display: flex;
    align-items: center;
    gap: var(--space-4);
    margin-bottom: var(--space-6);
    padding-bottom: var(--space-4);
    border-bottom: 1px solid var(--border-default);
}

.config-header h1 {
    font-size: 24px;
    font-weight: 700;
    color: var(--fg-primary);
}

.config-path {
    color: var(--fg-tertiary);
    font-family: var(--font-mono);
    font-size: 13px;
}

.config-layout {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: var(--space-6);
}

@media (max-width: 900px) {
    .config-layout {
        grid-template-columns: 1fr;
    }
}

.config-form-panel,
.config-yaml-panel {
    background: var(--bg-surface);
    border: 1px solid var(--border-default);
    border-radius: var(--radius-lg);
    padding: var(--space-5);
}

.config-form-panel h2,
.config-yaml-panel h2 {
    font-size: 16px;
    font-weight: 600;
    color: var(--fg-primary);
    margin-bottom: var(--space-4);
    text-transform: uppercase;
    letter-spacing: 0.04em;
}

.config-section {
    margin-bottom: var(--space-5);
}

.config-section-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--intent-factual);
    margin-bottom: var(--space-3);
    padding-bottom: var(--space-2);
    border-bottom: 1px solid var(--border-default);
}

.form-group {
    margin-bottom: var(--space-3);
}

.form-group label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: var(--fg-secondary);
    margin-bottom: var(--space-1);
}

.form-group input,
.form-group select {
    width: 100%;
    padding: var(--space-2) var(--space-3);
    background: var(--bg-input);
    border: 1px solid var(--border-default);
    border-radius: var(--radius-md);
    color: var(--fg-primary);
    font-size: 14px;
    font-family: var(--font-body);
    outline: none;
    transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
}

.form-group input:focus,
.form-group select:focus {
    border-color: var(--border-focus);
    box-shadow: var(--shadow-focus);
}

.form-group input[type="checkbox"] {
    width: auto;
    margin-right: var(--space-2);
}

.yaml-editor-wrapper {
    border: 1px solid var(--border-default);
    border-radius: var(--radius-md);
    overflow: hidden;
}

.yaml-editor {
    width: 100%;
    min-height: 500px;
    padding: var(--space-3);
    background: var(--bg-input);
    border: none;
    color: var(--fg-primary);
    font-size: 13px;
    font-family: var(--font-mono);
    line-height: 1.6;
    resize: vertical;
    outline: none;
}

.yaml-editor:focus {
    box-shadow: inset 0 0 0 1px var(--border-focus);
}

.form-actions {
    display: flex;
    gap: var(--space-3);
    margin-top: var(--space-4);
    padding-top: var(--space-4);
    border-top: 1px solid var(--border-default);
}

.btn-primary {
    padding: var(--space-2) var(--space-4);
    background: var(--signal-leaf-deep);
    border: none;
    border-radius: var(--radius-md);
    color: var(--fog-0);
    font-size: 13px;
    font-family: var(--font-body);
    font-weight: 500;
    cursor: pointer;
    transition: background var(--transition-fast);
}

.btn-primary:hover {
    background: var(--signal-leaf);
}

.btn-secondary {
    padding: var(--space-2) var(--space-4);
    background: transparent;
    border: 1px solid var(--border-default);
    border-radius: var(--radius-md);
    color: var(--fg-secondary);
    font-size: 13px;
    font-family: var(--font-body);
    font-weight: 500;
    cursor: pointer;
    transition: all var(--transition-fast);
}

.btn-secondary:hover {
    border-color: var(--border-hover);
    color: var(--fg-primary);
}

.config-status {
    margin-top: var(--space-4);
    padding: var(--space-3);
    border-radius: var(--radius-md);
    font-size: 13px;
    display: none;
}

.config-status.success {
    display: block;
    background: var(--tier-a-bg);
    color: var(--tier-a-fg);
    border: 1px solid var(--tier-a-fg);
}

.config-status.error {
    display: block;
    background: rgba(248, 81, 73, 0.1);
    color: var(--danger);
    border: 1px solid var(--danger);
}

.loading {
    color: var(--fg-tertiary);
    font-size: 14px;
    text-align: center;
    padding: var(--space-8);
}
</style>
{% endblock %}

{% block scripts %}
<script>
// Load and display current config
async function loadConfig() {
    try {
        const response = await fetch('/api/config', {
            headers: apiHeaders()
        });
        if (response.ok) {
            const config = await response.json();
            document.getElementById('config-yaml').value = JSON.stringify(config, null, 2);
        }
    } catch (err) {
        showStatus('error', 'Failed to load config: ' + err.message);
    }
}

async function saveConfigYaml() {
    const yamlText = document.getElementById('config-yaml').value;
    try {
        // Parse as JSON and PUT to /api/config
        const parsed = JSON.parse(yamlText);
        const response = await fetch('/api/config', {
            method: 'PUT',
            headers: Object.assign(apiHeaders(), {'Content-Type': 'application/json'}),
            body: JSON.stringify(parsed)
        });
        const result = await response.json();
        if (response.ok) {
            showStatus('success', 
                'Applied ' + (result.applied || []).length + ' settings' +
                (result.pending_restart?.length ? '. Restart required for: ' + result.pending_restart.join(', ') : ''));
        } else {
            showStatus('error', result.detail || result.error || 'Failed to save');
        }
    } catch (err) {
        showStatus('error', 'Invalid JSON: ' + err.message);
    }
}

function validateYaml() {
    try {
        const text = document.getElementById('config-yaml').value;
        JSON.parse(text);
        showStatus('success', 'Valid JSON');
    } catch (err) {
        showStatus('error', 'Invalid JSON: ' + err.message);
    }
}

function showStatus(type, message) {
    const status = document.getElementById('config-status');
    status.className = 'config-status ' + type;
    status.textContent = message;
    status.style.display = 'block';
    setTimeout(() => { status.style.display = 'none'; }, 5000);
}

// Initialize
loadConfig();
</script>
{% endblock %}
