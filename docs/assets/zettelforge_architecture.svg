<svg width="100%" viewBox="0 0 680 760" role="img" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
<title>ZettelForge architecture</title>
<desc>Four-stage pipeline showing ingestion, enrichment, retrieval, and synthesis, with a pluggable storage layer and optional extensions.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
<style>
.t-title { font-size: 14px; font-weight: 500; }
.t-sub { font-size: 12px; font-weight: 400; }
.arr { stroke: #9c9a92; stroke-width: 1.5; fill: none; }
</style>
</defs>

<rect x="0" y="0" width="680" height="760" fill="#1a1a1a"/>

<text class="t-title" x="340" y="32" text-anchor="middle" fill="#f5f5f0" font-size="16">ZettelForge pipeline</text>
<text class="t-sub" x="340" y="50" text-anchor="middle" fill="#b4b2a9">Raw input to grounded answer</text>

<!-- Raw input (gray) -->
<rect x="40" y="78" width="600" height="48" rx="8" fill="#2C2C2A" stroke="#888780" stroke-width="0.5"/>
<text class="t-title" x="340" y="98" text-anchor="middle" dominant-baseline="central" fill="#F1EFE8">Raw input</text>
<text class="t-sub" x="340" y="114" text-anchor="middle" dominant-baseline="central" fill="#D3D1C7">Reports, alerts, notes, IOCs</text>

<line x1="340" y1="126" x2="340" y2="152" class="arr" marker-end="url(#arrow)"/>

<!-- Stage 1: Ingestion (purple) -->
<rect x="40" y="152" width="600" height="76" rx="8" fill="#3C3489" stroke="#AFA9EC" stroke-width="0.5"/>
<text class="t-title" x="340" y="176" text-anchor="middle" dominant-baseline="central" fill="#EEEDFE">1. Ingestion</text>
<text class="t-sub" x="340" y="198" text-anchor="middle" dominant-baseline="central" fill="#CECBF6">Validate, build note, extract entities, resolve aliases</text>
<text class="t-sub" x="340" y="214" text-anchor="middle" dominant-baseline="central" fill="#CECBF6">Regex fast-path plus LLM fallback</text>

<line x1="340" y1="228" x2="340" y2="254" class="arr" marker-end="url(#arrow)"/>

<!-- Stage 2: Enrichment (teal) -->
<rect x="40" y="254" width="600" height="76" rx="8" fill="#085041" stroke="#5DCAA5" stroke-width="0.5"/>
<text class="t-title" x="340" y="278" text-anchor="middle" dominant-baseline="central" fill="#E1F5EE">2. Enrichment (background)</text>
<text class="t-sub" x="340" y="300" text-anchor="middle" dominant-baseline="central" fill="#9FE1CB">Causal triples, A-Mem neighbor refinement</text>
<text class="t-sub" x="340" y="316" text-anchor="middle" dominant-baseline="central" fill="#9FE1CB">HGAM consolidation</text>

<line x1="340" y1="330" x2="340" y2="356" class="arr" marker-end="url(#arrow)"/>

<!-- Stage 3: Retrieval (coral) -->
<rect x="40" y="356" width="600" height="76" rx="8" fill="#712B13" stroke="#F0997B" stroke-width="0.5"/>
<text class="t-title" x="340" y="380" text-anchor="middle" dominant-baseline="central" fill="#FAECE7">3. Retrieval</text>
<text class="t-sub" x="340" y="402" text-anchor="middle" dominant-baseline="central" fill="#F5C4B3">Intent classify, vector plus graph search</text>
<text class="t-sub" x="340" y="418" text-anchor="middle" dominant-baseline="central" fill="#F5C4B3">Temporal boost, cross-encoder rerank</text>

<line x1="340" y1="432" x2="340" y2="458" class="arr" marker-end="url(#arrow)"/>

<!-- Stage 4: Synthesis (amber) -->
<rect x="40" y="458" width="600" height="76" rx="8" fill="#633806" stroke="#EF9F27" stroke-width="0.5"/>
<text class="t-title" x="340" y="482" text-anchor="middle" dominant-baseline="central" fill="#FAEEDA">4. Synthesis</text>
<text class="t-sub" x="340" y="504" text-anchor="middle" dominant-baseline="central" fill="#FAC775">RAG-as-Answer with quality validation</text>
<text class="t-sub" x="340" y="520" text-anchor="middle" dominant-baseline="central" fill="#FAC775">Grounded response to user</text>

<!-- Storage layer header -->
<text class="t-title" x="340" y="570" text-anchor="middle" fill="#f5f5f0" font-size="15">Pluggable storage layer</text>
<text class="t-sub" x="340" y="588" text-anchor="middle" fill="#b4b2a9">StorageBackend ABC, 33 methods, set ZETTELFORGE_BACKEND to switch</text>

<!-- SQLite (blue) -->
<rect x="40" y="606" width="290" height="68" rx="8" fill="#0C447C" stroke="#85B7EB" stroke-width="0.5"/>
<text class="t-title" x="185" y="628" text-anchor="middle" dominant-baseline="central" fill="#E6F1FB">SQLite (default)</text>
<text class="t-sub" x="185" y="648" text-anchor="middle" dominant-baseline="central" fill="#B5D4F4">WAL mode, ACID, zero config</text>
<text class="t-sub" x="185" y="664" text-anchor="middle" dominant-baseline="central" fill="#B5D4F4">Notes, graph, entities in one file</text>

<!-- LanceDB (blue) -->
<rect x="350" y="606" width="290" height="68" rx="8" fill="#0C447C" stroke="#85B7EB" stroke-width="0.5"/>
<text class="t-title" x="495" y="628" text-anchor="middle" dominant-baseline="central" fill="#E6F1FB">LanceDB</text>
<text class="t-sub" x="495" y="648" text-anchor="middle" dominant-baseline="central" fill="#B5D4F4">768-dim vectors via fastembed</text>
<text class="t-sub" x="495" y="664" text-anchor="middle" dominant-baseline="central" fill="#B5D4F4">nomic-embed-text-v1.5-Q, ONNX</text>

<!-- Extensions (pink) -->
<rect x="40" y="694" width="600" height="48" rx="8" fill="#72243E" stroke="#ED93B1" stroke-width="0.5"/>
<text class="t-title" x="340" y="714" text-anchor="middle" dominant-baseline="central" fill="#FBEAF0">Optional extensions</text>
<text class="t-sub" x="340" y="730" text-anchor="middle" dominant-baseline="central" fill="#F4C0D1">TypeDB STIX 2.1, OAuth/JWT, OpenCTI sync, Sigma rules</text>
</svg>
